[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:mongod]
command=mongod --bind_ip_all --dbpath /data/db
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:api]
command=dotnet /app/mqonnor.API.dll
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

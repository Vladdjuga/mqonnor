# Two-container deployment: API + MongoDB as separate services (recommended).
# docker compose up --build

services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqonnor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__MongoDB: mongodb://mongo:27017
      MongoDB__Database: mqonnor
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  stress-tester:
    build:
      context: .
      dockerfile: Dockerfile.stresstester
    depends_on:
      mqonnor:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./stress-reports:/reports
    environment:
      RUN_ID: ${RUN_ID:-latest}
    entrypoint: ["/bin/sh", "-c", "mkdir -p /reports/$${RUN_ID} && dotnet mqonnor.StressTester.dll --url http://mqonnor:8080/hubs/events --report /reports/$${RUN_ID}/report.html"]

volumes:
  mongo_data:

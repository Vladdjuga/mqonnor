# Two-container deployment: API + MongoDB as separate services (recommended).
# docker compose up --build

services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqonnor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__MongoDB: mongodb://mongo:27017
      MongoDB__Database: mqonnor
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
